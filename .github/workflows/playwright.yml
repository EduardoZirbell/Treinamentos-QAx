name: Playwright E2E

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: |
            mark/api/package-lock.json
            mark/web/package-lock.json
            playwright/package-lock.json

      - name: Install API dependencies
        working-directory: mark/api
        run: yarn install

      - name: Init API database
        working-directory: mark/api
        run: yarn run db:init

      - name: Install Web dependencies
        working-directory: mark/web
        run: yarn install

      - name: Install Playwright dependencies
        working-directory: playwright
        run: yarn install

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Start API
        working-directory: mark/api
        run: yarn start &

      - name: Start Web
        working-directory: mark/web
        run: yarn start &

      - name: Wait for services
        run: |
          npx --yes wait-on http://127.0.0.1:8080 http://127.0.0.1:3333/tasks

      - name: Run E2E tests
        working-directory: playwright
        env:
          CI: true
          BASE_API: http://127.0.0.1:3333
          BASE_URL: http://127.0.0.1:8080
        run: yarn playwright test

      - name: Publish HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
          retention-days: 14
